name: thbsplines
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - tqdm>=4.65
  - jupyterlab>=4.0
  - ipympl>=0.9          # interactive matplotlib in notebooks (%matplotlib widget)
  - pytest>=7.0
  - pytest-cov
  - pip
  - pip:
      - -e .             # install THBSplines itself in editable mode
